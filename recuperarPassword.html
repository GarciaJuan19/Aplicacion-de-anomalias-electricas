<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FalloCero - Recuperar Contraseña</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0052cc">
    <script type="module" src="js/modo-oscuro.js"></script>
</head>
<body class="auth-body">

    <main class="auth-container">
        <header class="auth-header">
            <div class="logo-area">
                <i class='bx bxs-bolt-circle logo-icon'></i>
                <h1>FalloCero</h1>
            </div>
            <p class="auth-subtitle">Ingresa tu correo para enviarte un enlace de recuperación de contraseña</p>
        </header>

        <form id="form-recuperar" class="auth-form" novalidate>
            <div class="input-group">
                <label for="rec-correo">Correo Electrónico</label>
                <div class="input-field">
                    <i class='bx bx-envelope input-icon'></i>
                    <input type="email" id="rec-correo" placeholder="ejemplo@gmail.com" required>
                </div>
            </div>

            <button type="submit" id="btn-recuperar" class="btn-auth-submit">
                Enviar Enlace
            </button>
        </form>

        <footer class="auth-footer">
            <p>¿Recordaste tu contraseña? <a href="login.html" class="auth-link-action">Regresar al Login</a></p>
        </footer>
    </main>

    <script type="module" src="js/recuperarPassword.js"></script>
    <!-- Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('✅ SW registrado:', reg.scope))
        .catch(err => console.error('❌ SW error:', err));
    });
  }
</script>
</body>
</html>
