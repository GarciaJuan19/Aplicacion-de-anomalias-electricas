<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FalloCero - Admin Panel</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script type="module" src="../js/admin.js"></script>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0052cc">
    <!-- Registrar el Service Worker desde el HTML -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(registration => {
                    console.log('✅ SW registrado desde HTML');
                })
                .catch(err => {
                    console.warn('⚠️ Error registrando SW:', err);
                });
        });
    }
</script>
    <script src="../js/modo-oscuro.js" type="module"></script>
</head>

<body class="bg-light">

    <!-- Modal filtro fecha -->
    <div id="modal-fecha" class="modal-fecha-admin">
        <div class="modal-fecha-content-admin">
            <h3 class="modal-fecha-title-admin">Filtrar por fecha</h3>

            <label class="modal-fecha-label-admin" for="fecha-desde">Desde</label>
            <input type="date" id="fecha-desde" class="modal-fecha-input-admin">

            <label class="modal-fecha-label-admin" for="fecha-hasta">Hasta</label>
            <input type="date" id="fecha-hasta" class="modal-fecha-input-admin">

            <div class="modal-fecha-actions-admin">
                <button id="btn-limpiar-fecha" class="btn-fecha-secondary-admin">Limpiar</button>
                <button id="btn-aplicar-fecha" class="btn-fecha-primary-admin">Aplicar</button>
            </div>
        </div>
    </div>

    <!-- Modal Ver Detalles -->
    <div id="modal-detalle" class="modal-detalle-admin">
        <div class="modal-detalle-content-admin">

            <!-- Header -->
            <div class="modal-detalle-header-admin">
                <div class="modal-detalle-header-info-admin">
                    <div class="modal-detalle-icon-admin">
                        <i class='bx bx-error'></i>
                    </div>
                    <h2 class="modal-detalle-title-admin">Detalle del Reporte</h2>
                </div>
                <button id="btn-cerrar-modal" class="btn-cerrar-modal-admin">
                    <i class='bx bx-x'></i>
                </button>
            </div>

            <!-- Foto -->
            <div id="modal-foto-container" class="modal-detalle-foto-container-admin">
                <img id="modal-foto" src="" alt="Foto del reporte" class="modal-detalle-foto-admin">
            </div>

            <!-- Sin foto: placeholder -->
            <div id="modal-foto-placeholder" class="modal-detalle-foto-placeholder-admin">
                <i class='bx bx-image'></i>
            </div>

            <!-- Contenido -->
            <div class="modal-detalle-body-admin">

                <!-- Tipo + Estado -->
                <div class="modal-detalle-top-admin">
                    <h3 id="modal-tipo" class="modal-detalle-tipo-admin"></h3>
                    <span id="modal-badge" class="badge-status"></span>
                </div>

                <!-- Fecha -->
                <div class="modal-detalle-fecha-admin">
                    <i class='bx bx-time-five'></i>
                    <span id="detalle-fecha"></span>
                </div>

                <!-- Descripción -->
                <div class="modal-detalle-section-admin">
                    <p class="modal-detalle-section-title-admin">Descripción</p>
                    <p id="modal-descripcion" class="modal-detalle-descripcion-admin"></p>
                </div>

                <!-- Ubicación -->
                <div class="modal-detalle-section-admin">
                    <p class="modal-detalle-section-title-admin">Ubicación</p>
                    <div class="modal-detalle-ubicacion-row-admin">
                        <i class='bx bx-map'></i>
                        <span id="modal-ubicacion"></span>
                    </div>
                    <div id="modal-mapa-container" class="modal-detalle-mapa-container-admin">
                        <iframe id="modal-mapa" width="100%" height="150" style="border:0;" allowfullscreen=""
                            loading="lazy"></iframe>
                    </div>
                </div>

                <!-- Usuario -->
                <div class="modal-detalle-section-admin">
                    <p class="modal-detalle-section-title-admin">Reportado por</p>
                    <div class="modal-detalle-usuario-row-admin">
                        <i class='bx bx-user'></i>
                        <span id="modal-usuario"></span>
                    </div>
                </div>

                <!-- Cambiar Estado -->
                <div class="modal-detalle-section-admin">
                    <p class="modal-detalle-section-title-admin">Cambiar Estado</p>
                    <div class="modal-detalle-estado-buttons-admin">
                        <button class="btn-estado-modal" data-estado="pendiente">Pendiente</button>
                        <button class="btn-estado-modal" data-estado="en revisión">En Revisión</button>
                        <button class="btn-estado-modal" data-estado="resuelto">Resuelto</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Contenedor Principal del Panel -->
    <div class="admin-container">

        <header class="admin-header">
            <div class="admin-profile-left">
                <div id="admin-avatar-container" class="admin-avatar-container">
                    <i class='bx bx-user-circle default-avatar-icon'></i>
                </div>
                <h1 class="admin-title">Admin Panel</h1>
            </div>
            <button class="btn-logout-admin" id="btn-logout">
                <i class='bx bx-log-out'></i>
            </button>
        </header>

        <!-- Barra de Herramientas (Buscador y Filtro Fecha) -->
        <div class="admin-toolbar">
            <div class="search-container">
                <i class='bx bx-search search-icon'></i>
                <input type="text" id="search-input" class="search-input" placeholder="Buscar reporte o dirección...">
            </div>
            <button class="btn-filter-date" id="btn-filter-date">
                <i class='bx bx-calendar'></i> Filtrar por fecha
            </button>
        </div>

        <!-- Pestañas de Filtro por Estado -->
        <div class="status-filters">
            <button class="filter-tab active" data-status="Todos">Todos</button>
            <button class="filter-tab" data-status="PENDIENTE">Pendiente</button>
            <button class="filter-tab" data-status="EN REVISIÓN">En revisión</button>
            <button class="filter-tab" data-status="RESUELTO">Resuelto</button>
        </div>

        <!-- Grilla donde se renderizan las tarjetas mediante JS -->
        <main class="reports-grid" id="reports-container">
            <div class="loading-state">
                <i class='bx bx-loader-alt bx-spin'></i>
                <p>Cargando reportes desde Firestore...</p>
            </div>
        </main>

        <!-- Barra de navegación inferior fija -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">
                <i class='bx bx-file-blank'></i>
                <span>Reportes</span>
            </a>
            <a href="mapa-admin.html" class="nav-item">
                <i class='bx bx-map-alt'></i>
                <span>Mapa</span>
            </a>
            <a href="perfil-admin.html" class="nav-item">
                <i class='bx bx-cog'></i>
                <span>Ajustes</span>
            </a>
        </nav>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('✅ SW registrado:', reg.scope))
                    .catch(err => console.error('❌ SW error:', err));
            });
        }
    </script>
</body>

</html>
