<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FalloCero - Perfil Administrador</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0052cc">
</head>
<body class="bg-light">

    <div class="profile-container">
        
        <!-- HEADER -->
        <header class="profile-header">
            <a href="index.html" class="btn-back"><i class='bx bx-arrow-back'></i></a>
            <h2>Perfil Admin</h2>
            <div class="header-placeholder"></div>
        </header>

        <!-- TARJETA DE PERFIL -->
        <div class="profile-card-hero">
            <div class="avatar-wrapper">
                <div class="avatar-display-container">
                    <img src="" id="profile-preview" alt="Foto de perfil" class="hidden">
                    <i class='bx bx-user' id="profile-icon-placeholder"></i>
                </div>
                <label for="file-avatar" class="avatar-edit-badge">
                    <i class='bx bx-camera'></i>
                </label>
                <input type="file" id="file-avatar" accept="image/*" style="display: none;">
            </div>
            <h3 id="txt-user-name">Cargando...</h3>
            <p id="txt-user-email">...</p>
            <span class="admin-badge">
                <i class='bx bx-shield'></i> Administrador
            </span>
        </div>

        <!-- FORMULARIO DE PERFIL -->
        <form id="form-profile" class="profile-form">
            
            <div class="form-section-title">Datos Personales</div>

            <div class="input-group">
                <label for="profile-name">Nombre completo</label>
                <div class="input-wrapper">
                    <i class='bx bx-user input-icon'></i>
                    <input type="text" id="profile-name" placeholder="Tu nombre" required>
                </div>
            </div>

            <div class="form-section-title">Seguridad de la Cuenta</div>

            <div class="input-group">
                <label for="profile-password">Nueva Contraseña (Opcional)</label>
                <div class="input-wrapper">
                    <i class='bx bx-lock-alt input-icon'></i>
                    <input type="password" id="profile-password" placeholder="Mínimo 8 caracteres (letras y números)">
                    <i class='bx bx-hide password-toggle' id="toggle-profile-pass" 
                       style="cursor: pointer; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 20px;"></i>
                </div>
                <small class="input-help">Solo llénalo si deseas cambiar tu contraseña actual.</small>
            </div>

            <!-- SECCIÓN EXCLUSIVA PARA ADMIN -->
            <div class="form-section-title" style="margin-top: 8px;">Panel de Administración</div>

            <div class="admin-stats-card">
                <div class="stat-item">
                    <i class='bx bx-file-blank'></i>
                    <div>
                        <span class="stat-number" id="total-reportes">0</span>
                        <span class="stat-label">Reportes totales</span>
                    </div>
                </div>
                <div class="stat-item">
                    <i class='bx bx-time-five'></i>
                    <div>
                        <span class="stat-number" id="reportes-pendientes">0</span>
                        <span class="stat-label">Pendientes</span>
                    </div>
                </div>
                <div class="stat-item">
                    <i class='bx bx-check-circle'></i>
                    <div>
                        <span class="stat-number" id="reportes-resueltos">0</span>
                        <span class="stat-label">Resueltos</span>
                    </div>
                </div>
            </div>

            <div class="admin-actions">
                <a href="mapa-admin.html" class="btn-secondary" style="text-decoration: none; text-align: center;">
                    <i class='bx bx-map-alt'></i> Ver mapa de reportes
                </a>
                <a href="index.html" class="btn-secondary" style="text-decoration: none; text-align: center; margin-top: 8px;">
                    <i class='bx bx-file-blank'></i> Gestionar reportes
                </a>
            </div>

            <div class="profile-actions">
                <button type="submit" class="btn-primary" id="btn-save-profile">
                    <i class='bx bx-save'></i> Guardar Cambios
                </button>
                <button type="button" class="btn-logout" id="btn-logout-admin">
                    <i class='bx bx-log-out'></i> Cerrar Sesión
                </button>
            </div>

        </form>

    </div>

    <script type="module" src="../js/perfil-admin.js"></script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('✅ SW registrado:', reg.scope))
        .catch(err => console.error('❌ SW error:', err));
    });
  }
</script>
</body>
</html>
