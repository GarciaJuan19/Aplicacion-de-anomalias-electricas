<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FalloCero - Menú Principal</title>
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0052cc">
    <script type="module" src="js/modo-oscuro.js"></script>
    <script>
        const temaGuardado = localStorage.getItem('pwa_theme') ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', temaGuardado);
    </script>
</head>

<body>

    <div class="app-container">
        <header class="menu-header">
            <div class="user-profile-section">
                <div class="avatar-container">
                    <div class="menu-avatar-display" id="menu-avatar-display">
                        <img src="" alt="Foto de perfil" id="menu-profile-preview" style="display: none;">
                        <i class='bx bx-user avatar-fallback-icon' id="menu-avatar-icon"></i>
                    </div>
                    <!-- ⚠️ EL BADGE YA NO VA AQUÍ -->
                </div>

                <div class="user-welcome">
                    <span>Bienvenido</span>
                    <h2 id="user-display-name">Cargando...</h2>
                </div>

                <div class="header-actions">
                    <!-- ✅ BOTÓN DE NOTIFICACIONES CON BADGE -->
                    <button id="btn-notificaciones" class="btn-notificaciones" aria-label="Notificaciones">
                        <i id="icono-campana" class='bx bx-bell'></i>
                        <span id="badge-notificaciones" class="badge-notificaciones"></span>
                    </button>
                    <button id="btn-dark-mode" class="btn-toggle" ">
                        <i class="bx bx-moon"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="app-content menu-content">
            <!-- Alerta de verificación se inserta aquí dinámicamente -->

            <a href="index.html" class="menu-card">
                <div class="card-icon icon-alert">
                    <i class='bx bx-error-alt'></i>
                </div>
                <div class="card-info">
                    <h3>Reportar anomalía</h3>
                    <p>Notifica una nueva falla eléctrica</p>
                </div>
                <i class='bx bx-chevron-right arrow-next'></i>
            </a>

            <a href="mis-reportes.html" class="menu-card">
                <div class="card-icon icon-reports">
                    <i class='bx bx-list-check'></i>
                </div>
                <div class="card-info">
                    <h3>Mis reportes</h3>
                    <p>Revisa el estado de tus reportes</p>
                </div>
                <i class='bx bx-chevron-right arrow-next'></i>
            </a>

            <a href="mapa.html" class="menu-card">
                <div class="card-icon icon-map">
                    <i class='bx bx-map-alt'></i>
                </div>
                <div class="card-info">
                    <h3>Ver ubicación</h3>
                    <p>Mapa de fallas cercanas</p>
                </div>
                <i class='bx bx-chevron-right arrow-next'></i>
            </a>

            <a href="perfil.html" class="menu-card">
                <div class="card-icon icon-profile">
                    <i class='bx bx-user'></i>
                </div>
                <div class="card-info">
                    <h3>Mi perfil</h3>
                    <p>Administra tu cuenta</p>
                </div>
                <i class='bx bx-chevron-right arrow-next'></i>
            </a>

            <button type="button" id="btn-logout" class="menu-card card-logout">
                <div class="card-icon icon-logout">
                    <i class='bx bx-log-out'></i>
                </div>
                <div class="card-info">
                    <h3>Cerrar sesión</h3>
                    <p>Salir de tu cuenta</p>
                </div>
            </button>
        </main>
    </div>

    <!-- ========================================== -->
    <!--  MODAL DE NOTIFICACIONES                   -->
    <!-- ========================================== -->
    <div id="modal-notificaciones" class="modal-notificaciones">
        <div class="modal-notificaciones-content">
            <!-- Header -->
            <div class="modal-notificaciones-header">
                <div class="modal-notificaciones-title">
                    <i class='bx bxs-bell-ring'></i>
                    <h3>Notificaciones</h3>
                    <span id="modal-total-notif" class="modal-total-notif">0</span>
                </div>
                <button id="btn-cerrar-modal-notif" class="modal-close-btn">
                    <i class='bx bx-x'></i>
                </button>
            </div>

            <!-- Cuerpo -->
            <div id="modal-notificaciones-cuerpo" class="modal-notificaciones-body">
                <!-- El contenido se renderiza dinámicamente -->
            </div>

            <!-- Footer con botón "Marcar como visto" -->
            <div class="modal-notificaciones-footer">
                <button id="btn-marcar-visto" class="btn-marcar-visto">
                    <i class='bx bx-check-circle'></i>
                    Marcar como visto
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/menu.js"></script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('✅ SW registrado:', reg.scope))
                    .catch(err => console.error('❌ SW error:', err));
            });
        }
    </script>
</body>

</html>
